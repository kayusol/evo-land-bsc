name: Deploy to BSC Testnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
                run: npm install

      - name: Compile contracts
        run: npx hardhat compile --force

      - name: Deploy all 12 contracts
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          npx hardhat run scripts/deploy.js --network bscTestnet 2>&1 | tee deploy-output.log
          exit ${PIPESTATUS[0]}

      - name: Print deployed.json
        if: always()
        run: |
          echo "=== deployed.json ==="
          cat deployed.json 2>/dev/null || echo "(not found)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployed-addresses
          path: |
            deployed.json
            deploy-output.log
          retention-days: 30
