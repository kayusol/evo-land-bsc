name: Deploy to BSC Testnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install 2>&1

      - name: Show installed packages
        run: |
          echo "=== Hardhat version ==="
          npx hardhat --version
          echo "=== OZ version ==="
          cat node_modules/@openzeppelin/contracts/package.json | grep '"version"'

      - name: Compile contracts (verbose)
        run: |
          npx hardhat compile --force 2>&1
          echo "Compile exit code: $?"

      - name: Deploy to BSC Testnet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          npx hardhat run scripts/deploy.js --network bscTestnet 2>&1 | tee deploy-output.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          echo "Deploy exit code: $DEPLOY_EXIT"
          exit $DEPLOY_EXIT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployed-addresses
          path: |
            deployed.json
            deploy-output.log

      - name: Print results
        if: always()
        run: |
          echo "=== deployed.json ==="
          cat deployed.json 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== deploy log (last 100 lines) ==="
          tail -100 deploy-output.log 2>/dev/null || true
